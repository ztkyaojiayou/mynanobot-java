# Nanobot Spring Boot 配置
# ============================

spring:
  application:
    name: nanobot-java
  
  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/
    add-mappings: true

# 服务器配置
server:
  port: 8080
  servlet:
    context-path:

# Actuator 配置（健康检查）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# 日志配置（由 logback.xml 控制）
logging:
  level:
    root: INFO
    com.nanobot: DEBUG

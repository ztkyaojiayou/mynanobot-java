<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>会话管理 - Nanobot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        .toolbar { margin-bottom: 16px; display: flex; gap: 10px; }
        button { background: #1f6feb; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        button:hover { background: #388bfd; }
        button.danger { background: #da3633; }
        button.danger:hover { background: #f85149; }
        .session-list { border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        .session-item { border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .session-item:hover { background: #161b22; }
        .session-item:last-child { border-bottom: none; }
        .session-item .info { flex: 1; cursor: pointer; }
        .session-item .key { font-family: monospace; font-size: 13px; color: #58a6ff; }
        .session-item .name { font-size: 19px; font-weight: 600; color: #e6edf3; cursor: pointer; border-bottom: 1px dashed transparent; }
        .session-item .name:hover { border-bottom-color: #58a6ff; }
        .session-item .name input { background: #21262d; color: #e6edf3; border: 1px solid #58a6ff; border-radius: 4px; padding: 4px 10px; font-size: 19px; width: 300px; }
        .session-item .meta { font-size: 13px; color: #8b949e; margin-top: 6px; }
        .session-item .actions { display: flex; gap: 8px; flex-shrink: 0; }
        .empty { text-align: center; padding: 40px; color: #8b949e; }
        .loading { text-align: center; padding: 20px; color: #8b949e; }

        /* ═══════ 弹窗 ═══════ */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #30363d; }
        .modal-header h2 { color: #58a6ff; font-size: 16px; }
        .modal-close { background: none; border: none; color: #8b949e; font-size: 24px; cursor: pointer; padding: 0 4px; }
        .modal-close:hover { color: #fff; }
        .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
        .msg { padding: 8px 0; border-bottom: 1px solid #21262d; }
        .msg .role { font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .msg .role.user { color: #58a6ff; }
        .msg .role.assistant { color: #3fb950; }
        .msg .role.system { color: #8b949e; }
        .msg .role.tool { color: #d2991d; }
        .msg .content { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Nanobot 会话管理</h1>
    <div class="toolbar">
        <button onclick="loadSessions()">刷新列表</button>
        <a href="/" style="display:inline-block;padding:8px 20px;background:#1f6feb;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold;">返回聊天</a>
    </div>
    <div id="sessionList" class="session-list"><div class="loading">加载中...</div></div>

    <!-- 弹窗 -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">会话详情</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"><div class="loading">加载中...</div></div>
        </div>
    </div>

    <script>
        const API = '/api/sessions';

        async function loadSessions() {
            const el = document.getElementById('sessionList');
            try {
                const res = await fetch(API);
                const sessions = await res.json();
                if (!sessions || !sessions.length) { el.innerHTML = '<div class="empty">暂无会话</div>'; return; }
                el.innerHTML = sessions.map(s =>
                    '<div class="session-item">' +
                        '<div class="info">' +
                            '<div class="name" onclick="event.stopPropagation();startRename(\'' + s.key + '\', this)" title="点击编辑名称">' +
                                escapeHtml(s.name || s.key) +
                            '</div>' +
                            '<div class="meta">' + s.key + ' · ' + s.messageCount + ' 条消息 · ' + new Date(s.lastModified).toLocaleString() + '</div>' +
                        '</div>' +
                        '<div class="actions">' +
                            '<button onclick="event.stopPropagation();viewSession(\'' + s.key + '\')">查看</button>' +
                            '<button class="danger" onclick="event.stopPropagation();deleteSession(\'' + s.key + '\')">删除</button>' +
                        '</div>' +
                    '</div>'
                ).join('');
            } catch (e) {
                el.innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
            }
        }

        function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        async function viewSession(key) {
            document.getElementById('modalTitle').textContent = key;
            document.getElementById('modalBody').innerHTML = '<div class="loading">加载中...</div>';
            openModal();
            try {
                const res = await fetch(API + '/' + key);
                if (!res.ok) { document.getElementById('modalBody').innerHTML = '<div class="empty">会话不存在</div>'; return; }
                const data = await res.json();
                document.getElementById('modalBody').innerHTML = data.messages.map(m =>
                    '<div class="msg">' +
                        '<div class="role ' + m.role + '">' + m.role + '</div>' +
                        '<div class="content">' + escapeHtml(String(m.content || '')) + '</div>' +
                    '</div>'
                ).join('');
            } catch (e) {
                document.getElementById('modalBody').innerHTML = '<div class="empty">加载失败: ' + e.message + '</div>';
            }
        }

        async function deleteSession(key) {
            if (!confirm('确定删除会话 ' + key + '？')) return;
            await fetch(API + '/' + key, { method: 'DELETE' });
            closeModal();
            loadSessions();
        }

        function startRename(key, el) {
            const currentName = el.textContent.trim();
            const input = document.createElement('input');
            input.value = currentName === key ? '' : currentName;
            input.placeholder = key;
            el.innerHTML = '';
            el.appendChild(input);
            input.focus();
            input.select();
            input.onblur = () => finishRename(key, input.value.trim(), el);
            input.onkeydown = (e) => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { el.textContent = currentName; }
            };
        }

        async function finishRename(key, name, el) {
            const displayName = name || key;
            el.textContent = displayName;
            if (name && name !== key) {
                await fetch(API + '/' + key, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });
            }
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        loadSessions();
    </script>
</body>
</html>

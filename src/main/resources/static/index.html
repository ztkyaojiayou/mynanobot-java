<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot - AI Assistant</title>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           Nanobot — ChatGPT-style Layout
           ═══════════════════════════════════════════════════════════════ */
        :root {
            --sidebar-w: 260px;
            --brand: #1f6feb;
            --brand-hover: #388bfd;
            --brand-light: #e8f0fe;
            --bg-sidebar: #f9fafb;
            --bg-main: #ffffff;
            --bg-input: #f4f4f5;
            --border: #e5e7eb;
            --border-light: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --hover-item: #f3f4f6;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════════════
           1. 左侧窄侧边栏 — 固定宽度，垂直铺满
           ═══════════════════════════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        /* 1.1 顶部操作区 — 「+ 新聊天」蓝色按钮 */
        .sidebar-top {
            padding: 12px;
            flex-shrink: 0;
        }
        .btn-new-chat {
            width: 100%;
            padding: 10px 0;
            background: var(--brand);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background .15s;
        }
        .btn-new-chat:hover { background: var(--brand-hover); }
        .btn-new-chat .plus { font-size: 18px; font-weight: 400; line-height: 1; }

        /* 1.2 会话列表区 — 中间主体，可滚动 */
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
            min-height: 0;
        }
        .session-list-empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
        .session-item {
            padding: 10px 12px;
            margin-bottom: 2px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background .1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .session-item:hover { background: var(--hover-item); }
        .session-item.active { background: #e5e7eb; }
        .session-item .info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .session-item .name {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }
        .session-item .name input {
            width: 100%;
            background: #fff;
            color: var(--text-primary);
            border: 1px solid var(--brand);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 13px;
            outline: none;
        }
        .session-item .meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .session-item .actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            visibility: hidden;
        }
        .session-item:hover .actions { visibility: visible; }
        .session-item .act-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
        }
        .session-item .act-btn:hover { background: #e0e0e0; color: var(--text-primary); }
        .session-item .act-btn.danger:hover { color: #ef4444; }

        /* 1.3 底部全局操作区 — 贴底 */
        .sidebar-bottom {
            padding: 8px 12px 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .btn-clear-all {
            width: 100%;
            padding: 8px 0;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all .15s;
        }
        .btn-clear-all:hover {
            color: #ef4444;
            border-color: #fca5a5;
            background: #fef2f2;
        }

        /* ═══════════════════════════════════════════════════════════════
           2. 右侧主聊天面板 — 自适应填充剩余宽度
           ═══════════════════════════════════════════════════════════════ */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
            background: var(--bg-main);
        }

        /* 2.1 顶部标题栏 */
        .chat-topbar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--bg-main);
        }
        .chat-topbar .session-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .chat-topbar .model-badge {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-sidebar);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        /* 2.2 消息画布区 — 中间可滚动 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            min-height: 0;
        }

        /* 空态 — 可视区垂直居中 */
        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 24px;
            user-select: none;
        }

        /* 单条消息 — 居中窄区域（max-width:768px），左右大量留白 */
        .message {
            max-width: 768px;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 4px;
            padding: 0 40px;
            line-height: 1.8;
            font-size: 15px;
            width: 100%;
        }
        .message:first-child { margin-top: 16px; }

        /* 用户消息 — 靠右，浅灰背景气泡 */
        .user-message {
            display: flex;
            justify-content: flex-end;
        }
        .user-message .bubble {
            background: var(--bg-input);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 18px;
            max-width: 80%;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.65;
        }

        /* Bot 消息 — 纯白无背景，干净文本 */
        .bot-message {
            display: flex;
            gap: 16px;
            padding: 16px 0;
        }
        .bot-message .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            background: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            margin-top: 2px;
        }
        .bot-message .content {
            flex: 1;
            min-width: 0;
        }

        /* 消息底部操作按钮（复制/点赞/重新生成） */
        .msg-actions {
            display: flex;
            gap: 2px;
            margin-top: 10px;
            opacity: 0;
            transition: opacity .15s;
            min-height: 22px;
        }
        .bot-message:hover .msg-actions { opacity: 1; }
        .msg-actions button {
            height: 26px;
            padding: 0 8px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 5px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            transition: background .1s, color .1s;
            white-space: nowrap;
        }
        .msg-actions button:hover { background: var(--hover-item); color: var(--text-primary); }
        .msg-actions .copied { color: #16a34a; border-color: #86efac; }

        /* Typing indicator */
        .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%; background: #c0c0c0;
            display: inline-block; animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        /* 2.3 底部固定输入栏 */
        .input-area {
            padding: 16px 0 24px;
            flex-shrink: 0;
            background: var(--bg-main);
        }
        .input-area-inner {
            max-width: 768px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            padding: 6px 6px 6px 16px;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-row:focus-within {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(31,111,235,0.12);
        }
        .input-row textarea {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            resize: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
            padding: 4px 0;
        }
        .input-row textarea::placeholder { color: var(--text-muted); }

        /* 小图标按钮（文件/检索） */
        .icon-btn {
            width: 32px; height: 32px;
            border: none; background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: background .1s, color .1s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: #e5e7eb; color: var(--text-primary); }
        .icon-btn.active { color: var(--brand); background: var(--brand-light); }

        /* 操作按钮（流式/发送） */
        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-stream {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-stream:hover { background: var(--hover-item); }
        .btn-stream.active {
            background: var(--brand-light);
            color: var(--brand);
            border-color: var(--brand);
        }
        .btn-send {
            background: var(--brand);
            color: #fff;
            padding: 6px 16px;
        }
        .btn-send:hover { background: var(--brand-hover); }
        .btn-send:disabled { opacity: .5; cursor: not-allowed; }

        /* ═══════════════════════════════════════════════════════════════
           Markdown 内容样式
           ═══════════════════════════════════════════════════════════════ */
        .message-content { word-wrap: break-word; overflow-wrap: anywhere; }
        .message-content p { margin: 6px 0; }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: .88em;
            color: #c7254e;
        }
        .message-content pre {
            background: #f5f5f5;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
            line-height: 1.6;
        }
        .message-content pre code { background: none; color: var(--text-primary); padding: 0; font-size: inherit; }
        .message-content blockquote {
            border-left: 3px solid var(--brand);
            padding-left: 14px;
            color: var(--text-secondary);
            margin: 8px 0;
        }
        .message-content strong { color: var(--text-primary); }
        .message-content a { color: var(--brand); text-decoration: underline; }
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 16px 0 8px;
            font-weight: 600;
            line-height: 1.35;
        }
        .message-content h1:first-child,
        .message-content h2:first-child,
        .message-content h3:first-child { margin-top: 0; }
        .message-content h1 { font-size: 1.45em; }
        .message-content h2 { font-size: 1.25em; }
        .message-content h3 { font-size: 1.1em; }
        .message-content ul, .message-content ol {
            padding-left: 22px;
            margin: 6px 0;
        }
        .message-content li { margin: 2px 0; line-height: 1.7; }
        .message-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

        /* ═══════════════════════════════════════════════════════════════
           滚动条
           ═══════════════════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
   1. 左侧窄侧边栏 — 固定 260px，垂直铺满全屏
   ═══════════════════════════════════════════════════════════════════ -->
<div class="sidebar">

    <!-- 1.1 顶部操作区：「+ 新聊天」蓝色按钮 -->
    <div class="sidebar-top">
        <button class="btn-new-chat" onclick="newSession()">
            <span class="plus">+</span> 新聊天
        </button>
    </div>

    <!-- 1.2 会话列表区 — 中间可滚动 -->
    <div class="session-list" id="sessionList">
        <div class="session-list-empty">暂无历史会话</div>
    </div>

    <!-- 1.3 底部全局操作区 — 贴底 -->
    <div class="sidebar-bottom">
        <button class="btn-clear-all" onclick="clearAllSessions()">清空所有会话</button>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
   2. 右侧主聊天面板 — 自适应填充
   ═══════════════════════════════════════════════════════════════════ -->
<div class="chat-area">

    <!-- 2.1 顶部标题栏 -->
    <div class="chat-topbar">
        <span class="session-title" id="currentSessionName">新对话</span>
        <span class="model-badge">DeepSeek-chat</span>
    </div>

    <!-- 2.2 消息画布区 — 可滚动 -->
    <div class="messages" id="messages">
        <div class="empty-chat">准备好了，随时开始</div>
    </div>

    <!-- 2.3 底部固定输入栏 -->
    <div class="input-area">
        <div class="input-area-inner">
            <div class="input-row">
                <textarea
                    id="inputMessage"
                    rows="1"
                    placeholder="输入消息..."
                    autocomplete="off"
                ></textarea>
                <button id="searchBtn" class="icon-btn" onclick="toggleSearch()" title="联网搜索">🔍</button>
                <button id="streamBtn" class="action-btn btn-stream active" onclick="toggleStream()">⚡ 流式</button>
                <button class="action-btn btn-send" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* ═══════════════════════════════════════════════════════════════════
       JavaScript — 保留全部现有 API / 流式 / 会话逻辑，仅适配新 DOM
       ═══════════════════════════════════════════════════════════════════ */

    const API = '/api/sessions';
    let sessionId = 'web-' + Date.now();
    let useSearch = false, useStream = true, isNewSession = true;
    let currentStreamingEl = null, currentStreamingContent = '';

    // ═══ 会话列表 ═══
    async function loadSessions() {
        const el = document.getElementById('sessionList');
        try {
            const res = await fetch(API);
            let sessions = await res.json();
            const seen = new Set();
            sessions = sessions.filter(s => seen.has(s.key) ? false : seen.add(s.key));
            if (!sessions.length) {
                el.innerHTML = '<div class="session-list-empty">暂无历史会话</div>';
                return;
            }
            el.innerHTML = sessions.map(s => `
                <div class="session-item${s.key===sessionId?' active':''}" onclick="switchSession('${s.key}')">
                    <div class="info">
                        <div class="name">${escHtml(s.name||s.key)}</div>
                        <div class="meta">${s.messageCount||0} 条 · ${new Date(s.lastModified).toLocaleDateString()}</div>
                    </div>
                    <div class="actions">
                        <button class="act-btn" onclick="event.stopPropagation();startRename('${s.key}',this.closest('.session-item').querySelector('.name'))" title="重命名">✎</button>
                        <button class="act-btn danger" onclick="event.stopPropagation();deleteSession('${s.key}')" title="删除">×</button>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    function newSession() {
        sessionId = 'web-' + Date.now();
        isNewSession = true;
        document.getElementById('messages').innerHTML = '<div class="empty-chat">准备好了，随时开始</div>';
        document.getElementById('currentSessionName').textContent = '新对话';
        loadSessions();
    }

    async function switchSession(key) {
        sessionId = key;
        isNewSession = false;
        document.getElementById('currentSessionName').textContent = key;
        document.getElementById('messages').innerHTML = '<div class="empty-chat">加载中...</div>';
        loadSessions();
        try {
            const res = await fetch(API + '/' + key);
            if (!res.ok) return;
            const data = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            if (!data.messages || !data.messages.length) {
                container.innerHTML = '<div class="empty-chat">准备好了，随时开始</div>';
            } else {
                data.messages.forEach(m => {
                    if (m.role === 'user') addMsg('user', m.content);
                    else if (m.role === 'assistant') addMsg('bot', m.content);
                });
            }
            document.getElementById('currentSessionName').textContent = data.key;
        } catch(e) { console.error(e); }
    }

    async function deleteSession(key) {
        if (!confirm('确定删除该会话？')) return;
        await fetch(API + '/' + key, { method: 'DELETE' });
        if (key === sessionId) newSession();
        loadSessions();
    }

    async function clearAllSessions() {
        if (!confirm('确定删除全部会话？此操作不可撤销。')) return;
        try {
            const res = await fetch(API);
            const sessions = await res.json();
            await Promise.all(sessions.map(s => fetch(API + '/' + s.key, { method: 'DELETE' })));
        } catch(e) {}
        newSession();
        loadSessions();
    }

    function startRename(key, el) {
        const cur = el.textContent.trim();
        const inp = document.createElement('input');
        inp.value = cur === key ? '' : cur;
        inp.placeholder = key;
        el.innerHTML = ''; el.appendChild(inp);
        inp.focus(); inp.select();
        inp.onblur = () => finishRename(key, inp.value.trim(), el);
        inp.onkeydown = e => { if (e.key==='Enter') inp.blur(); if (e.key==='Escape') el.textContent = cur; };
    }

    async function finishRename(key, name, el) {
        el.textContent = name || key;
        if (name && name !== key) {
            await fetch(API + '/' + key, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name}) });
            if (key === sessionId) document.getElementById('currentSessionName').textContent = name;
        }
    }

    // ═══ 聊天 ═══
    function toggleSearch() {
        useSearch = !useSearch;
        document.getElementById('searchBtn').classList.toggle('active', useSearch);
    }

    function toggleStream() {
        useStream = !useStream;
        const btn = document.getElementById('streamBtn');
        btn.classList.toggle('active', useStream);
        btn.textContent = useStream ? '⚡ 流式' : '📤 普通';
    }

    function addMsg(type, content) {
        const wrap = document.getElementById('messages');
        // 移除空态占位
        const empty = wrap.querySelector('.empty-chat');
        if (empty) empty.remove();

        const div = document.createElement('div');
        div.className = 'message ' + (type === 'user' ? 'user-message' : 'bot-message');
        if (type === 'bot') {
            div.innerHTML = `<div class="avatar">N</div><div class="content"><div class="message-content">${md2html(content)}</div><div class="msg-actions"><button onclick="copyMsg(this)">📋 复制</button><button disabled>👍</button><button disabled>🔄</button></div></div>`;
        } else {
            div.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
        }
        wrap.appendChild(div);
        wrap.scrollTop = wrap.scrollHeight;
    }

    async function sendMessage() {
        const inp = document.getElementById('inputMessage');
        const content = inp.value.trim();
        if (!content) return;
        inp.value = '';
        // 重置 textarea 高度
        inp.style.height = 'auto';
        // 移除空态
        const empty = document.querySelector('.empty-chat');
        if (empty) empty.remove();

        addMsg('user', content);

        if (useStream) {
            currentStreamingEl = null; currentStreamingContent = '';
            try {
                const res = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','Accept':'text/event-stream'},
                    body: JSON.stringify({channel:'http',sessionId,content,useSearch,streamMode:true,requestId: Date.now()+'-'+Math.random().toString(36)})
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';
                let eventData = '';  // 累积多行 data:xxx 为一个完整事件
                while (true) {
                    const {done,value} = await reader.read();
                    if (value) { buf += decoder.decode(value,{stream:!done}); }
                    const lines = buf.split('\n');
                    buf = !done && buf[buf.length-1]!=='\n' ? lines.pop() : '';
                    for (const l of lines) {
                        if (l.startsWith('data:')) {
                            // 连续多行 data:xxx → 用 \n 拼接，恢复原始换行
                            const d = l.substring(5).replace(/^ /,'');
                            if (d==='[DONE]') { currentStreamingEl = null; break; }
                            eventData += (eventData ? '\n' : '') + d;
                        } else if (l === '' && eventData) {
                            // 空行 = SSE 事件分隔符 → 一个完整事件到齐，渲染
                            if (!currentStreamingEl) { currentStreamingEl = createStreamEl(); currentStreamingContent = ''; }
                            // SSE 事件之间用 \n 分隔（恢复 LLM 输出中的换行）
                            if (currentStreamingContent && !currentStreamingContent.endsWith('\n')) {
                                currentStreamingContent += '\n';
                            }
                            currentStreamingContent += eventData;
                            currentStreamingEl.innerHTML = md2html(currentStreamingContent);
                            const msgs = document.getElementById('messages');
                            msgs.scrollTop = msgs.scrollHeight;
                            eventData = '';
                        }
                    }
                    // 流结束或有积压数据 → 最后一次渲染
                    if (done) {
                        if (eventData) {
                            if (!currentStreamingEl) { currentStreamingEl = createStreamEl(); currentStreamingContent = ''; }
                            currentStreamingContent += eventData;
                            currentStreamingEl.innerHTML = md2html(currentStreamingContent);
                        }
                        currentStreamingEl = null; break;
                    }
                }
            } catch(e) {
                addMsg('bot', '连接失败: ' + e.message);
            }
        } else {
            // 非流式：显示 typing 指示器
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message';
            typingDiv.innerHTML = '<div class="avatar">N</div><div class="content"><div class="message-content"><div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div></div>';
            document.getElementById('messages').appendChild(typingDiv);
            try {
                const res = await fetch('/api/chat?'+Date.now(), {
                    method: 'POST',
                    headers: {'Content-Type':'application/json','Cache-Control':'no-cache'},
                    body: JSON.stringify({channel:'http',sessionId,content,useSearch,streamMode:false,timestamp:Date.now()})
                });
                typingDiv.remove();
                const data = await res.json();
                addMsg('bot', data.content || '无响应');
            } catch(e) {
                typingDiv.remove();
                addMsg('bot', '请求失败');
            }
        }
        if (isNewSession) { isNewSession = false; autoTitle(content); }
        loadSessions();
    }

    async function autoTitle(firstMsg) {
        const title = firstMsg.replace(/\s+/g, ' ').trim().substring(0, 20) + (firstMsg.length > 20 ? '…' : '');
        document.getElementById('currentSessionName').textContent = title;
        await fetch(API + '/' + sessionId, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name: title}) });
    }

    function createStreamEl() {
        const div = document.createElement('div');
        div.className = 'message bot-message';
        div.innerHTML = '<div class="avatar">N</div><div class="content"><div class="message-content"></div><div class="msg-actions"><button onclick="copyMsg(this)">📋 复制</button><button disabled>👍</button><button disabled>🔄</button></div></div>';
        document.getElementById('messages').appendChild(div);
        return div.querySelector('.message-content');
    }

    // ═══ Markdown → HTML ============================================================
    // 策略：按 ``` 拆分成段 → 奇偶交替（正文/代码块）→ 各自处理 → 拼接
    // 流式渲染兼容：最后一段如果未闭合，自动保护
    // ==================================================================================
    function md2html(text) {
        if (!text) return '';

        // ── 第1步：按 ``` 拆分为段 ──
        const parts = text.split('```');
        // parts[0] 正文, parts[1] 代码块, parts[2] 正文, parts[3] 代码块, ...
        // 偶数索引 = 正文, 奇数索引 = 代码块

        let result = '';

        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 0) {
                // ── 正文段：完整 markdown 处理 ──
                result += processText(parts[i]);
            } else {
                // ── 代码块段 ──
                let seg = parts[i];
                let lang = '';
                // 提取语言标记（```java 中的 java）
                const nl = seg.indexOf('\n');
                if (nl >= 0) {
                    lang = seg.substring(0, nl).trim();
                    seg = seg.substring(nl + 1);
                }

                // 最后一个代码块段且未闭合 → 流式渲染中
                if (i === parts.length - 1 && parts.length % 2 === 0) {
                    // 未闭合：直接包裹，保留原样（可能还在流式输出中）
                    const langTag = lang ? ' class="language-' + lang + '"' : '';
                    result += '<pre><code' + langTag + '>' + escHtml(seg) + '</code></pre>';
                } else {
                    // 已闭合：从内容中分离语言标记（如果有）
                    const langTag = lang ? ' class="language-' + lang + '"' : '';
                    result += '<pre><code' + langTag + '>' + escHtml(seg.trimEnd()) + '</code></pre>';
                }
            }
        }

        return result;
    }

    /** 处理纯文本段（标题/列表/粗体/链接/换行等） */
    function processText(text) {
        if (!text) return '';

        // 转义 HTML（反引号不受影响，之后单独处理）
        let h = escHtml(text);

        // 块级元素
        h = h.replace(/^###\s*(.*)$/gm, (_, t) => t.trim() ? '<h3>' + t.trim() + '</h3>' : '');
        h = h.replace(/^##\s*(.*)$/gm, (_, t) => t.trim() ? '<h2>' + t.trim() + '</h2>' : '');
        h = h.replace(/^#\s*(.*)$/gm, (_, t) => t.trim() ? '<h1>' + t.trim() + '</h1>' : '');
        h = h.replace(/^---+/gm, '<hr>');
        h = h.replace(/^>\s?(.+)$/gm, '<blockquote>$1</blockquote>');

        // 列表
        h = h.replace(/^[-*]\s+(.+)$/gm, '%%UL%%$1%%/LI%%');
        h = h.replace(/^\d+[.)]\s+(.+)$/gm, '%%OL%%$1%%/LI%%');
        h = h.replace(/((?:%%UL%%.*?%%\/LI%%\n?)+)/g, '<ul>$1</ul>');
        h = h.replace(/((?:%%OL%%.*?%%\/LI%%\n?)+)/g, '<ol>$1</ol>');
        h = h.replace(/%%UL%%/g, '<li>').replace(/%%OL%%/g, '<li>').replace(/%%\/LI%%/g, '</li>');

        // 内联格式（注意：代码内的 ** 已被保护，这里只处理正文中的）
        h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
        h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

        // 行内代码：反引号不被 escHtml 影响，放在其他内联格式之后处理
        h = h.replace(/`([^`]+)`/g, '<code>$1</code>');

        // 换行
        h = h.replace(/\n\n+/g, '</p><p>');
        h = h.replace(/\n/g, '<br>');

        // 包裹段落
        if (h.length && !h.startsWith('<')) h = '<p>' + h;
        if (h.length && !h.endsWith('>')) h = h + '</p>';

        return h;
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function copyMsg(btn) {
        const contentEl = btn.closest('.content').querySelector('.message-content');
        const text = contentEl ? contentEl.textContent : '';
        navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            btn.textContent = '✅ 已复制';
            setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 复制'; }, 2000);
        }).catch(() => {});
    }

    // ═══ Textarea 自适应高度 + 快捷键 ═══
    const textarea = document.getElementById('inputMessage');
    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    });
    textarea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        // Shift+Enter 自动换行（默认行为，无需处理）
    });

    // ═══ init ═══
    loadSessions();
</script>
</body>
</html>

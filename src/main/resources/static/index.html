<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-nanobot - AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            text-align: center;
            padding: 20px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .chat-box {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 75%;
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .bot-message {
            align-self: flex-start;
            background: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 6px;
        }

        .bot-message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            float: left;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .bot-message .content {
            margin-left: 46px;
        }

        .typing-indicator {
            display: flex;
            padding: 10px;
            color: #666;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 3px;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .input-area {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 8px;
        }

        /* 搜索按钮 */
        .search-btn {
            padding: 14px 24px;
            border: 2px solid #ddd;
            border-radius: 30px;
            background: #fff;
            color: #888;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .search-btn:hover {
            background: #fafafa;
            border-color: #ccc;
        }

        .search-btn.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            color: white;
            box-shadow: 
                0 6px 25px rgba(16, 185, 129, 0.4),
                0 0 0 3px rgba(16, 185, 129, 0.1);
            transform: scale(1.05);
        }

        .search-btn.active:hover {
            transform: scale(1.07);
            box-shadow: 
                0 8px 30px rgba(16, 185, 129, 0.5),
                0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .search-btn.active:active {
            transform: scale(1.03);
        }

        /* 选中状态的勾选动画 */
        .search-btn.active::after {
            content: ' ✓';
            display: inline-block;
            animation: checkPulse 0.3s ease;
        }

        @keyframes checkPulse {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .status-bar {
            text-align: center;
            margin-top: 15px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .status-online {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* 消息内容样式优化 */
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
            font-size: 15px;
            color: #333;
        }

        .message-content p {
            margin: 12px 0;
            padding: 0;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul,
        .message-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 6px 0;
            line-height: 1.8;
        }

        .message-content strong,
        .message-content b {
            font-weight: 600;
            color: #222;
        }

        .message-content em,
        .message-content i {
            font-style: italic;
        }

        .message-content h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 16px 0 12px;
            color: #1a1a1a;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .message-content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 14px 0 10px;
            color: #222;
        }

        .message-content h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 0 8px;
            color: #333;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 16px 0;
        }

        .message-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 16px;
            margin: 12px 0;
            color: #666;
            background: #f8f8f8;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
        }

        .message-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            color: #c7254e;
        }

        .message-content pre {
            background: #1a1a1a;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-content pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .message-content a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .message-content a:hover {
            border-bottom-color: #667eea;
        }

        .message-content .highlight {
            background: #fff3cd;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 my-nanobot</h1>
            <p>AI Agent - Powered by DeepSeek</p>
        </div>

        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="bot-message">
                    <div class="avatar">N</div>
                    <div class="content">
                        您好！我是 Nanobot，一个基于 DeepSeek 的 AI 助手。<br>
                        请问我可以帮您做什么？
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="inputMessage" placeholder="输入消息..." autocomplete="off">
                <div class="button-group">
                    <button id="sendBtn">发送</button>
                    <button id="searchBtn" class="search-btn">🔍 联网查</button>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-online"></span>
            <span>服务已就绪 - 模型: deepseek-chat</span>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const inputMessage = document.getElementById('inputMessage');
        const sendBtn = document.getElementById('sendBtn');
        const searchBtn = document.getElementById('searchBtn');
        let chatId = 'web-' + Date.now();
        let useSearchMode = false;

        // 切换搜索模式
        function toggleSearchMode() {
            useSearchMode = !useSearchMode;
            if (useSearchMode) {
                searchBtn.classList.add('active');
            } else {
                searchBtn.classList.remove('active');
            }
        }

        // 发送消息
        async function sendMessage() {
            const content = inputMessage.value.trim();
            if (!content) return;

            // 添加用户消息（显示搜索标记）
            const displayContent = useSearchMode ? '[🔍] ' + content : content;
            addMessage('user', displayContent);
            inputMessage.value = '';

            // 添加打字状态
            const typingIndicator = addTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        channel: 'http',
                        chatId: chatId,
                        content: content,
                        useSearch: useSearchMode
                    })
                });

                // 移除打字状态
                typingIndicator.remove();

                if (response.ok) {
                    const data = await response.json();
                    if (data.content) {
                        addMessage('bot', data.content);
                    } else {
                        addMessage('bot', '抱歉，我无法处理您的请求。');
                    }
                } else {
                    addMessage('bot', '请求失败，请稍后重试。');
                }
            } catch (error) {
                typingIndicator.remove();
                addMessage('bot', '连接失败，请检查网络连接。');
                console.error('Error:', error);
            }
        }

        // 添加消息
        function addMessage(type, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'user' ? 'message user-message' : 'message bot-message';

            if (type === 'bot') {
                messageDiv.innerHTML = `
                    <div class="avatar">N</div>
                    <div class="content">
                        <div class="message-content">${markdownToHtml(content)}</div>
                    </div>
                `;
            } else {
                messageDiv.textContent = content;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        // Markdown 转 HTML（简化版，支持常用格式）
        function markdownToHtml(text) {
            if (!text) return '';
            
            let html = escapeHtml(text);
            
            // 处理段落（连续两个换行）
            html = html.replace(/\n\n/g, '</p><p>');
            
            // 处理换行（单个换行）
            html = html.replace(/\n/g, '<br>');
            
            // 处理标题
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // 处理粗体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
            
            // 处理斜体
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');
            
            // 处理代码
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 处理代码块
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // 处理引用
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // 处理无序列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            
            // 处理有序列表
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // 处理链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
            
            // 处理分割线
            html = html.replace(/^---$/gm, '<hr>');
            
            // 确保包裹在段落标签中
            if (!html.startsWith('<p>')) {
                html = '<p>' + html + '</p>';
            }
            
            return html;
        }

        // 添加打字指示器
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bot-message';
            typingDiv.innerHTML = `
                <div class="avatar">N</div>
                <div class="content">
                    <div class="typing-indicator">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }

        // 滚动到底部
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听
        sendBtn.addEventListener('click', sendMessage);
        searchBtn.addEventListener('click', toggleSearchMode);
        inputMessage.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
